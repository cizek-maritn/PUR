services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: purcizek
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/purcizek
      HOST: 0.0.0.0
      PORT: 5000
      SEED_DEMO_DATA: 'true'
    depends_on:
      - db
    ports:
      - '5000:5000'

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:5000
    depends_on:
      - backend
    ports:
      - '4173:4173'

volumes:
  db-data: